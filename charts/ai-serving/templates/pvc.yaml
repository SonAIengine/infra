{{- if .Values.modelStorage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-serving.fullname" . }}-models
  namespace: {{ include "ai-serving.namespace" . }}
  labels:
    {{- include "ai-serving.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.modelStorage.storageClass }}
  resources:
    requests:
      storage: {{ .Values.modelStorage.size }}
{{- end }}
