# -- Override chart name
nameOverride: ""
# -- Override fully qualified app name
fullnameOverride: ""
# -- Target namespace (created if set)
namespace: ""

# =============================================================================
# Server Component
# =============================================================================
server:
  enabled: true
  name: server
  image:
    repository: ""
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3001
  env: []
  # - name: NODE_ENV
  #   value: "production"
  envFrom: []
  # - secretRef:
  #     name: my-secret
  #     optional: true
  healthCheck:
    enabled: true
    path: /api/v1/health
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 30
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "4"
      memory: "4Gi"
  volumes: []
  volumeMounts: []

# =============================================================================
# Client Component
# =============================================================================
client:
  enabled: true
  name: web
  image:
    repository: ""
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  env: []
  envFrom: []
  healthCheck:
    enabled: true
    path: /
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 20
      periodSeconds: 30
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  # -- ConfigMap to mount into client container (e.g. nginx config)
  configMap:
    enabled: false
    name: ""
    mountPath: ""
    subPath: ""
    data: {}
  volumes: []
  volumeMounts: []

# =============================================================================
# Databases
# =============================================================================
databases:
  postgresql:
    enabled: false
    image: postgres:16-alpine
    port: 5432
    storage: 20Gi
    storageClass: local-path
    secretName: ""
    secretKeys:
      user: DB_USER
      password: DB_PASSWORD
      database: DB_NAME
    healthCheck:
      readiness:
        initialDelaySeconds: 5
        periodSeconds: 10
      liveness:
        initialDelaySeconds: 30
        periodSeconds: 30
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "2"
        memory: "2Gi"

  mongodb:
    enabled: false
    image: mongo:7
    port: 27017
    storage: 20Gi
    storageClass: local-path
    secretName: ""
    secretKeys:
      rootUser: MONGO_ROOT_USER
      rootPassword: MONGO_ROOT_PASSWORD
    initDatabase: ""
    healthCheck:
      readiness:
        initialDelaySeconds: 10
        periodSeconds: 10
      liveness:
        initialDelaySeconds: 30
        periodSeconds: 30
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "2"
        memory: "2Gi"

  redis:
    enabled: false
    image: redis:7-alpine
    port: 6379
    storage: 5Gi
    storageClass: local-path
    secretName: ""
    secretKeys:
      password: REDIS_PASSWORD
    healthCheck:
      readiness:
        initialDelaySeconds: 5
        periodSeconds: 10
      liveness:
        initialDelaySeconds: 30
        periodSeconds: 30
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "1Gi"

# =============================================================================
# Ingress (Traefik)
# =============================================================================
ingress:
  enabled: true
  annotations: {}
  middleware:
    redirectHttps: true
  tls:
    enabled: true
    secretName: ""
    certManager: true
    issuer: letsencrypt-prod
  rules:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
          component: client

# =============================================================================
# Persistent Volume Claims (extra, beyond database PVCs)
# =============================================================================
persistence:
  volumes: []
  # - name: uploads-data
  #   size: 10Gi
  #   storageClass: local-path
  #   accessMode: ReadWriteOnce

# =============================================================================
# ConfigMaps (extra, beyond client configMap)
# =============================================================================
configMaps: []
# - name: my-config
#   data:
#     key: value
