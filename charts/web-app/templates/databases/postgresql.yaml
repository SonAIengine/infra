{{- if .Values.databases.postgresql.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: {{ include "web-app.namespace" . }}
  labels:
    {{- include "web-app.labels" . | nindent 4 }}
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.databases.postgresql.storageClass }}
  resources:
    requests:
      storage: {{ .Values.databases.postgresql.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ include "web-app.namespace" . }}
  labels:
    {{- include "web-app.labels" . | nindent 4 }}
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.databases.postgresql.image }}
          ports:
            - containerPort: {{ .Values.databases.postgresql.port }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databases.postgresql.secretName }}
                  key: {{ .Values.databases.postgresql.secretKeys.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databases.postgresql.secretName }}
                  key: {{ .Values.databases.postgresql.secretKeys.password }}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databases.postgresql.secretName }}
                  key: {{ .Values.databases.postgresql.secretKeys.database }}
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          {{- with .Values.databases.postgresql.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: {{ .Values.databases.postgresql.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.databases.postgresql.healthCheck.readiness.periodSeconds }}
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: {{ .Values.databases.postgresql.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.databases.postgresql.healthCheck.liveness.periodSeconds }}
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ include "web-app.namespace" . }}
  labels:
    {{- include "web-app.labels" . | nindent 4 }}
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: {{ .Values.databases.postgresql.port }}
      targetPort: {{ .Values.databases.postgresql.port }}
      protocol: TCP
{{- end }}
