{{- if .Values.server.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.server.name }}
  namespace: {{ include "web-app.namespace" . }}
  labels:
    {{- include "web-app.server.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "web-app.server.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.server.port }}
      targetPort: {{ .Values.server.port }}
      protocol: TCP
{{- end }}
