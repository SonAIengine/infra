namespace: dongtan

# =============================================================================
# Server (Node.js backend)
# =============================================================================
server:
  enabled: true
  name: server
  image:
    repository: docker.io/library/dongtan-server
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3001
  env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "3001"
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: dongtan-app-secret
          key: DATABASE_URL
    - name: REDIS_URL
      valueFrom:
        secretKeyRef:
          name: dongtan-app-secret
          key: REDIS_URL
    - name: FRONTEND_URL
      value: "https://dongtan.infoedu.co.kr"
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: dongtan-app-secret
          key: JWT_SECRET
    - name: JWT_REFRESH_SECRET
      valueFrom:
        secretKeyRef:
          name: dongtan-app-secret
          key: JWT_REFRESH_SECRET
  envFrom:
    - secretRef:
        name: dongtan-api-keys
        optional: true
  healthCheck:
    enabled: true
    path: /api/v1/health
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 30
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "4"
      memory: "4Gi"

# =============================================================================
# Client (Nginx serving React SPA)
# =============================================================================
client:
  enabled: true
  name: web
  image:
    repository: docker.io/library/dongtan-web
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  healthCheck:
    enabled: true
    path: /
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 20
      periodSeconds: 30
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  configMap:
    enabled: true
    name: web-nginx-config
    mountPath: /etc/nginx/conf.d/default.conf
    subPath: default.conf
    data:
      default.conf: |-
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

        server {
            listen 80;
            server_name _;
            root /usr/share/nginx/html;
            index index.html;

            location /assets/ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }

            location /api/ {
                proxy_pass http://server:3001;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location / {
                try_files $uri $uri/ /index.html;
            }

            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

# =============================================================================
# Databases
# =============================================================================
databases:
  postgresql:
    enabled: true
    image: postgres:16-alpine
    port: 5432
    storage: 20Gi
    storageClass: local-path
    secretName: dongtan-db-secret
    secretKeys:
      user: DB_USER
      password: DB_PASSWORD
      database: DB_NAME
    healthCheck:
      readiness:
        initialDelaySeconds: 5
        periodSeconds: 10
      liveness:
        initialDelaySeconds: 30
        periodSeconds: 30
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "2"
        memory: "2Gi"

  redis:
    enabled: true
    image: redis:7-alpine
    port: 6379
    storage: 5Gi
    storageClass: local-path
    secretName: dongtan-db-secret
    secretKeys:
      password: REDIS_PASSWORD
    healthCheck:
      readiness:
        initialDelaySeconds: 5
        periodSeconds: 10
      liveness:
        initialDelaySeconds: 30
        periodSeconds: 30
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1"
        memory: "1Gi"

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: true
  middleware:
    redirectHttps: true
  tls:
    enabled: true
    secretName: dongtan-tls
    certManager: true
    issuer: letsencrypt-prod
  rules:
    - host: dongtan.infoedu.co.kr
      paths:
        - path: /
          pathType: Prefix
          component: client
