# =============================================================================
# Template for onboarding a new application
# Copy this file to apps/<app-name>/values.yaml and fill in the values
# =============================================================================

namespace: <app-name>

server:
  enabled: true
  name: <app-name>-server
  image:
    repository: docker.io/library/<app-name>-server
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3001
  env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "3001"
    # Add your env vars here
    # - name: DATABASE_URL
    #   valueFrom:
    #     secretKeyRef:
    #       name: <app-name>-app-secret
    #       key: DATABASE_URL
  envFrom: []
  healthCheck:
    enabled: true
    path: /api/health
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 30
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"

client:
  enabled: true
  name: <app-name>-client
  image:
    repository: docker.io/library/<app-name>-client
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  healthCheck:
    enabled: true
    path: /
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 20
      periodSeconds: 30
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  configMap:
    enabled: false

# Uncomment and configure the databases you need
databases:
  postgresql:
    enabled: false
    # secretName: <app-name>-db-secret
  mongodb:
    enabled: false
    # secretName: <app-name>-db-secret
  redis:
    enabled: false
    # secretName: <app-name>-db-secret

ingress:
  enabled: true
  middleware:
    redirectHttps: true
  tls:
    enabled: true
    secretName: <app-name>-tls
    certManager: true
    issuer: letsencrypt-prod
  rules:
    - host: <your-domain.com>
      paths:
        - path: /
          pathType: Prefix
          component: client
